# Highway Segment Scene Configuration
# Multi-lane highway with merging traffic and variable weather.

scene:
  type: highway_segment
  size: [500, 40, 10]
  weather: clear
  time_of_day: "08:00"

physics:
  gravity: -9.81
  dt: 0.004167
  solver_iterations: 8
  restitution: 0.2

agents:
  count: 40
  behavior: waypoint
  spawn_region: full
  max_speed: 30.0        # ~108 km/h for vehicles
  neighbor_radius: 20.0
  goal_tolerance: 5.0
  seed: 123

simulation:
  total_steps: 2000
  warmup_steps: 100
  target_fps: 30

export:
  format: kitti
  modalities:
    - rgb
    - depth
  resolution: [1242, 375]   # KITTI standard resolution
  frame_skip: 3
  compress: true

metadata:
  experiment: highway_merge_v1
  author: leonard@gidronai.me
